name: 刷课

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  Start:
    runs-on: ubuntu-latest
    steps:
      - name: 拷贝代码
        uses: actions/checkout@v4

      - name: 设置python环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: 安装依赖包
        run: |
          pip install -r ./requirements.txt

      - name: Run main.py
        run: python main.py -u 15568758968 -p aa080802 -l 258951917
